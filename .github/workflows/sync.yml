name: Sync to Hugging Face hub
on:
  push:
    branches: [master, main]
  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 1
          
      - name: Push to HF securely
        env:
          HF_TOKEN: ${{ secrets.HF_SPACE_DOTSRIVAL_TOKEN }}
        run: |
          mkdir /tmp/deploy
          cp app.py preview.html Dockerfile requirements.txt /tmp/deploy/
          cat << 'EOF' > /tmp/deploy/README.md
          ---
          title: DriveBase
          emoji: 🚀
          colorFrom: blue
          colorTo: indigo
          sdk: docker
          app_port: 7860
          pinned: false
          ---
          EOF
          
          git clone https://DOTSRIVAL:$HF_TOKEN@huggingface.co/spaces/DOTSRIVAL/reclone /tmp/hf_repo
          cd /tmp/hf_repo
          cp /tmp/deploy/* .
          
          git config user.name "GitHub Action"
          git config user.email "action@github.com"
          git add .
          git commit -m "Update from GitHub" || echo "No changes to commit"
          git push https://DOTSRIVAL:$HF_TOKEN@huggingface.co/spaces/DOTSRIVAL/reclone main
